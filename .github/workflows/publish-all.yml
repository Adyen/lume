name: Publish both Lume packages
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Use Node version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: true

      - name: Build the package
        run: pnpm run build

      - name: Publish Vue 2 package to npm registry
        run: pnpm publish --filter='./packages/vue2' --no-git-checks

      - name: Publish Vue 3 package to npm registry
        run: pnpm publish --filter='./packages/vue3' --no-git-checks
